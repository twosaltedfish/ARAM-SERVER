# ============================================================
# 用法：上传到服务器 /etc/nginx/conf.d/www.liceworld.online.conf
# 证书目录约定：/etc/nginx/ssl/www.liceworld.online/
#   用户提供的文件：
#     www.liceworld.online.pem  -> 证书（可能是单张叶证书，也可能已含中间链）
#     www.liceworld.online.key  -> 私钥
# 重要：ssl_certificate 必须包含「完整证书链（叶证书+中间证书）」，
#       否则微信小程序会报「SSL 握手失败 / 证书不受信任」。
# 验证 .pem 是否含链：grep -c "BEGIN CERTIFICATE" www.liceworld.online.pem
#   - 结果 > 1 ：已含链，直接用本配置即可
#   - 结果 = 1 ：只有叶证书，缺中间链，需到证书控制台下载「bundle/chain」文件，
#               合并：cat www.liceworld.online.pem chain.pem > fullchain.pem
#               并把下面 ssl_certificate 改成 fullchain.pem
# ============================================================

# HTTP 80：强制跳转 HTTPS（保留 certbot 续期校验路径，手动证书可保留无害）
server {
    listen 80;
    server_name www.liceworld.online;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 443：反代到本地后端 3000
server {
    listen 443 ssl http2;
    server_name www.liceworld.online;

    ssl_certificate     /etc/nginx/ssl/www.liceworld.online/www.liceworld.online.pem;
    ssl_certificate_key /etc/nginx/ssl/www.liceworld.online/www.liceworld.online.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 反代到本地 Node 后端（server.js 监听 0.0.0.0:3000）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
